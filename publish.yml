name: Publish to PyPI

# Publish only when a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Binding to a GitHub Environment is recommended: you can add required
    # reviewers / branch restrictions on PyPI's side.
    environment:
      name: pypi
      url: https://pypi.org/p/boringlog
    permissions:
      id-token: write   # MANDATORY for trusted publishing (OIDC); no API token
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
